<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Job Application Form</title>
</head>
<body>
    <div class="container">
        <form id="job-application">
            <div class="company-info">
                <h1>Full Stack Software Developer Application</h1>
                <h3>Wasatch Consulting</h3>
            </div>
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" required minlength="2" maxlength="100">
                <span id="fullNameError" class="error"></span>
            </div>
            <div class="contact-info">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                    <span id="emailError" class="error"></span>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number:</label>
                    <input type="text" id="phoneNumber" required>
                    <span id="phoneNumberError" class="error"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" id="address" required>
                <span id="addressError" class="error"></span>
            </div>
            <div class="contact-info">
                <div class="form-group">
                    <label for="zip">Zip Code:</label>
                    <input type="text" id="zip" required pattern="\d{5}" title="Please enter a valid zip code">
                    <span id="zipError" class="error"></span>
                </div>
                <div class="form-group">
                    <label for="linkedin">LinkedIn Profile URL:</label>
                    <input type="url" id="linkedin" required>
                    <span id="linkedinError" class="error"></span>
                </div>
            </div>
            <div class="contact-info">
                <div class="form-group">
                    <label for="resume">Resume:</label>
                    <input type="file" id="resume" required>
                    <span id="resumeError" class="error"></span>
                </div>
                <div class="form-group">
                    <label for="coverLetter">Cover Letter:</label>
                    <input type="file" id="coverLetter" required>
                    <span id="coverLetterError" class="error"></span>
                </div>
            </div>
            <div class="button-group">
                <button type="submit" class="submit-btn">Apply</button>
                <button type="reset" class="reset-btn">Reset</button>
            </div>
        </form>
    </div>
    <p>Designed and Devloped by Lincoln Bunker</p>
    <script src="scripts/script.js"></script>
</body>
</html>
